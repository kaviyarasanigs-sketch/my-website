<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interview Scheduler</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f13; --surface: #1a1a24; --surface2: #22222f;
    --accent: #7c6af7; --accent2: #a78bfa;
    --user-bg: #7c6af7; --bot-bg: #22222f;
    --text: #f0eeff; --muted: #8b8aa8;
    --border: #2e2e42; --success: #34d399; --error: #f87171;
  }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex;
    align-items: center; justify-content: center; padding: 20px;
    background-image: radial-gradient(ellipse at 20% 20%, rgba(124,106,247,0.08) 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 80%, rgba(167,139,250,0.05) 0%, transparent 60%);
  }
  .container { width:100%; max-width:560px; display:flex; flex-direction:column; min-height:92vh; max-height:900px; }

  /* Header */
  .header { display:flex; align-items:center; gap:14px; padding:20px 0 18px; border-bottom:1px solid var(--border); margin-bottom:20px; }
  .header-icon { width:44px; height:44px; background:linear-gradient(135deg,var(--accent),var(--accent2)); border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:20px; }
  .header-text h1 { font-family:'DM Serif Display',serif; font-size:20px; font-weight:400; }
  .header-text p { font-size:12px; color:var(--muted); margin-top:2px; }
  .dot { width:7px; height:7px; background:var(--success); border-radius:50%; display:inline-block; margin-right:5px; animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* Steps - now 5 steps instead of 6 */
  .steps-bar { display:flex; gap:0; margin-bottom:20px; background:var(--surface2); border-radius:12px; padding:4px; border:1px solid var(--border); }
  .stp { flex:1; text-align:center; padding:7px 2px; border-radius:9px; font-size:11px; color:var(--muted); transition:all .3s; }
  .stp.active { background:var(--accent); color:white; }
  .stp.done { color:var(--success); }
  .stp span { display:block; font-size:10px; margin-bottom:1px; }

  /* Form */
  .form-card { background:var(--surface2); border:1px solid var(--border); border-radius:18px; padding:24px; animation:fadeUp .35s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .form-title { font-family:'DM Serif Display',serif; font-size:19px; font-weight:400; margin-bottom:20px; }
  .flabel { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.8px; display:block; margin-bottom:6px; }
  .finput {
    width:100%; padding:12px 16px; background:var(--surface);
    border:1px solid var(--border); border-radius:12px;
    color:var(--text); font-family:'DM Sans',sans-serif; font-size:15px;
    outline:none; transition:border-color .2s; margin-bottom:4px;
  }
  .finput:focus { border-color:var(--accent); }
  .finput.err { border-color:var(--error); }
  .fhint { font-size:12px; color:var(--muted); margin-bottom:14px; }
  .ferr { font-size:12px; color:var(--error); margin-bottom:14px; display:none; }
  .ferr.show { display:block; }

  /* Role chips */
  .chips { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px; }
  .chip {
    padding:7px 14px; background:transparent; border:1px solid var(--border);
    color:var(--muted); border-radius:20px; font-size:13px;
    font-family:'DM Sans',sans-serif; cursor:pointer; transition:all .2s;
  }
  .chip:hover, .chip.sel { border-color:var(--accent); color:var(--accent2); background:rgba(124,106,247,.1); }

  /* Date row */
  .dt-row { display:flex; gap:12px; }
  .dt-row>div { flex:1; }

  /* Buttons */
  .btn { width:100%; padding:13px; border-radius:12px; border:none; font-family:'DM Sans',sans-serif; font-size:15px; font-weight:600; cursor:pointer; transition:all .2s; }
  .btn-p { background:var(--accent); color:white; }
  .btn-p:hover { background:var(--accent2); transform:translateY(-1px); }
  .btn-p:disabled { background:var(--border); cursor:not-allowed; transform:none; }
  .btn-g { background:transparent; color:var(--muted); border:1px solid var(--border); margin-top:8px; }
  .btn-g:hover { border-color:var(--accent); color:var(--accent2); }

  /* Summary */
  .sumcard { background:var(--surface2); border:1px solid var(--border); border-radius:14px; padding:16px 18px; font-size:13.5px; }
  .srow { display:flex; justify-content:space-between; gap:10px; padding:5px 0; }
  .slabel { color:var(--muted); font-size:12px; }
  .sval { color:var(--text); font-weight:500; text-align:right; font-size:13px; }
  .sdiv { border:none; border-top:1px solid var(--border); }

  /* Chat */
  #chat-area { display:none; flex:1; flex-direction:column; }
  #chatbox { flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:12px; padding-right:4px; }
  #chatbox::-webkit-scrollbar { width:4px; }
  #chatbox::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
  .mrow { display:flex; align-items:flex-end; gap:10px; animation:fadeUp .3s ease; }
  .mrow.u { flex-direction:row-reverse; }
  .av { width:30px; height:30px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:14px; background:var(--surface2); border:1px solid var(--border); flex-shrink:0; }
  .mrow.u .av { background:linear-gradient(135deg,var(--accent),var(--accent2)); border:none; }
  .bub { max-width:78%; padding:12px 16px; border-radius:18px; font-size:14.5px; line-height:1.6; word-break:break-word; }
  .bot .bub { background:var(--bot-bg); border:1px solid var(--border); border-bottom-left-radius:4px; }
  .mrow.u .bub { background:var(--user-bg); border-bottom-right-radius:4px; color:white; }

  .tdots { display:flex; gap:5px; align-items:center; padding:14px 18px; }
  .td { width:7px; height:7px; background:var(--muted); border-radius:50%; animation:bounce 1.2s infinite; }
  .td:nth-child(2){animation-delay:.2s} .td:nth-child(3){animation-delay:.4s}
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

  /* Date alt cards */
  .dtopts { display:flex; flex-direction:column; gap:8px; margin-top:6px; padding-left:40px; }
  .dtcard { background:var(--surface2); border:1px solid var(--border); border-radius:12px; padding:12px 16px; cursor:pointer; transition:all .2s; display:flex; align-items:center; gap:12px; animation:fadeUp .3s ease; }
  .dtcard:hover { border-color:var(--accent); background:rgba(124,106,247,.08); transform:translateX(4px); }

  /* Success */
  .success { text-align:center; padding:24px 16px; animation:fadeUp .4s ease; }
  .success-icon { font-size:50px; margin-bottom:14px; }
  .success-title { font-family:'DM Serif Display',serif; font-size:22px; margin-bottom:8px; }
  .success-sub { color:var(--muted); font-size:14px; line-height:1.6; margin-bottom:20px; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-icon">🗓️</div>
    <div class="header-text">
      <h1>Interview Scheduler</h1>
      <p><span class="dot"></span>Online · Powered by AI</p>
    </div>
  </div>

  <!-- 5 steps: Name, Email, Role, Date, Confirm -->
  <div class="steps-bar" id="sbar">
    <div class="stp active" id="s0"><span>1</span>Name</div>
    <div class="stp" id="s1"><span>2</span>Email</div>
    <div class="stp" id="s2"><span>3</span>Role</div>
    <div class="stp" id="s3"><span>4</span>Date</div>
    <div class="stp" id="s4"><span>5</span>Confirm</div>
  </div>

  <div id="form-wrap"></div>

  <div id="chat-area">
    <div id="chatbox"></div>
  </div>

</div>
<script>
const WH = 'http://localhost:5678/webhook/post-date';
let sid = 'sess-' + Math.random().toString(36).slice(2,9);
let D = { name:'', email:'', role:'', date:'', time:'' };
let cur = 0;
const ROLES = ['Software Engineer','Data Analyst','Product Manager','UI/UX Designer','DevOps','Marketing','Other'];

function todayISO() { return new Date().toISOString().split('T')[0]; }

function fmtTime(t) {
  if (!t) return '';
  const [h,m] = t.split(':').map(Number);
  return `${h%12||12}:${String(m).padStart(2,'0')} ${h>=12?'PM':'AM'}`;
}

function fmtDT(dateStr, timeStr) {
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const d = new Date(dateStr+'T12:00:00');
  return `${days[d.getDay()]}, ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()} · ${fmtTime(timeStr)}`;
}

function setProgress(n) {
  cur = n;
  for (let i=0;i<5;i++) {
    const e = document.getElementById('s'+i);
    e.className = 'stp' + (i<n?' done':i===n?' active':'');
  }
}

function render(n) {
  setProgress(n);
  const fw = document.getElementById('form-wrap');
  fw.style.display = 'block';
  document.getElementById('chat-area').style.display = 'none';

  const back = n>0 ? `<button class="btn btn-g" onclick="render(${n-1})">← Back</button>` : '';

  if (n===0) fw.innerHTML = `<div class="form-card">
    <div class="form-title">👋 Let's schedule your interview</div>
    <label class="flabel">Full Name</label>
    <input class="finput" id="fi" placeholder="e.g. Arun Kumar" value="${D.name}">
    <div class="ferr" id="fe">Please enter your full name (min 2 characters).</div>
    <button class="btn btn-p" onclick="go()">Continue →</button></div>`;

  else if (n===1) fw.innerHTML = `<div class="form-card">
    <div class="form-title">📧 Your email address?</div>
    <label class="flabel">Email</label>
    <input class="finput" id="fi" type="email" placeholder="name@gmail.com" value="${D.email}">
    <div class="ferr" id="fe">Please enter a valid email.</div>
    <button class="btn btn-p" onclick="go()">Continue →</button>${back}</div>`;

  else if (n===2) {
    const chips = ROLES.map(r=>`<button class="chip${D.role===r?' sel':''}" onclick="pickRole('${r}')">${r}</button>`).join('');
    fw.innerHTML = `<div class="form-card">
    <div class="form-title">💼 Role applying for?</div>
    <div class="chips">${chips}</div>
    <label class="flabel">Or type here</label>
    <input class="finput" id="fi" placeholder="e.g. Backend Developer" value="${D.role}">
    <div class="ferr" id="fe">Please enter or select your role.</div>
    <button class="btn btn-p" onclick="go()">Continue →</button>${back}</div>`;
  }

  else if (n===3) fw.innerHTML = `<div class="form-card">
    <div class="form-title">📅 Preferred date & time?</div>
    <div class="dt-row">
      <div><label class="flabel">Date</label>
        <input class="finput" id="fi-d" type="date" min="${todayISO()}" value="${D.date}"></div>
      <div><label class="flabel">Time</label>
        <input class="finput" id="fi-t" type="time" value="${D.time||'10:00'}"></div>
    </div>
    <div class="fhint">Weekdays only (Mon–Fri)</div>
    <div class="ferr" id="fe">Please select a valid weekday date and time.</div>
    <button class="btn btn-p" onclick="go()">Check Availability →</button>${back}</div>`;

  else if (n===4) {
    const dt = fmtDT(D.date, D.time);
    fw.innerHTML = `<div class="form-card">
    <div class="form-title">✅ Confirm your booking</div>
    <div class="sumcard" style="margin-bottom:16px">
      <div class="srow"><span class="slabel">Name</span><span class="sval">${D.name}</span></div><hr class="sdiv">
      <div class="srow"><span class="slabel">Email</span><span class="sval">${D.email}</span></div><hr class="sdiv">
      <div class="srow"><span class="slabel">Role</span><span class="sval">${D.role}</span></div><hr class="sdiv">
      <div class="srow"><span class="slabel">Date & Time</span><span class="sval">${dt}</span></div>
    </div>
    <button class="btn btn-p" id="cbtn" onclick="book()">🗓️ Confirm & Book Interview</button>
    ${back}</div>`;
  }

  setTimeout(()=>{ const fi=document.getElementById('fi'); if(fi){fi.focus();fi.onkeypress=e=>{if(e.key==='Enter')go()};} },80);
}

function pickRole(r) {
  D.role = r;
  document.getElementById('fi').value = r;
  document.querySelectorAll('.chip').forEach(c=>c.className='chip'+(c.textContent===r?' sel':''));
}

function go() {
  const fe=document.getElementById('fe');
  const fi=document.getElementById('fi');
  const ok = (v,fn) => { if(!fn(v)){fi&&fi.classList.add('err');fe.classList.add('show');return false;} fi&&fi.classList.remove('err');fe.classList.remove('show');return true; };

  if (cur===0) { if(!ok(fi.value.trim(),v=>v.length>=2)) return; D.name=fi.value.trim(); }
  else if (cur===1) { if(!ok(fi.value.trim(),v=>/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v))) return; D.email=fi.value.trim(); }
  else if (cur===2) { if(!ok(fi.value.trim(),v=>v.length>=2)) return; D.role=fi.value.trim(); }
  else if (cur===3) {
    const d=document.getElementById('fi-d').value, t=document.getElementById('fi-t').value;
    if(!d||!t){fe.classList.add('show');return;}
    const day=new Date(d+'T12:00:00').getDay();
    if(day===0||day===6){fe.textContent='Please pick a weekday (Mon–Fri).';fe.classList.add('show');return;}
    D.date=d; D.time=t;
  }
  render(cur+1);
}

async function book() {
  document.getElementById('cbtn').disabled=true;
  document.getElementById('cbtn').textContent='Booking...';
  document.getElementById('form-wrap').style.display='none';
  document.getElementById('sbar').style.display='none';
  document.getElementById('chat-area').style.display='flex';

  const dt = fmtDT(D.date, D.time);
  botMsg(`Checking availability for <strong>${dt}</strong>...`);
  showT();

  try {
    const r = await fetch(WH, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        sessionId: sid, action:'book_interview',
        name:D.name, email:D.email, role:D.role,
        date:D.date, time:D.time, datetime:dt,
        message:`Please book interview: Name=${D.name}, Email=${D.email}, Role=${D.role}, DateTime=${dt}`
      })
    });
    hideT();
    const txt = await r.text();
    let j={}; try{j=JSON.parse(txt);}catch(e){}
    const rep = j.reply||j.output||j.message||j.text||'';

    const taken = !r.ok || j.booked===false ||
      /already booked|not available|unavailable|taken/i.test(rep);

    if (taken) {
      botMsg(`⚠️ <strong>${dt}</strong> is already booked. Please pick one of these available slots:`);
      showAlts(j.alternatives || genAlts());
    } else {
      showSuccess(rep || `Your interview has been booked for <strong>${dt}</strong>. A confirmation will be sent to ${D.email}. See you soon! 🎉`);
    }
  } catch(e) {
    hideT();
    botMsg(`⚠️ Connection error: <strong>${e.message}</strong><br>Make sure n8n is running and workflow is Published.`);
    setTimeout(()=>{
      document.getElementById('form-wrap').style.display='block';
      document.getElementById('sbar').style.display='flex';
      document.getElementById('chat-area').style.display='none';
      render(4);
    }, 3000);
  }
}

function showSuccess(msg) {
  const cb = document.getElementById('chatbox');
  cb.innerHTML='';
  const dt = fmtDT(D.date, D.time);
  cb.innerHTML=`<div class="success">
    <div class="success-icon">🎉</div>
    <div class="success-title">Interview Confirmed!</div>
    <div class="success-sub">${msg}</div>
    <div class="sumcard" style="text-align:left">
      <div class="srow"><span class="slabel">Name</span><span class="sval">${D.name}</span></div><hr class="sdiv">
      <div class="srow"><span class="slabel">Email</span><span class="sval">${D.email}</span></div><hr class="sdiv">
      <div class="srow"><span class="slabel">Role</span><span class="sval">${D.role}</span></div><hr class="sdiv">
      <div class="srow"><span class="slabel">Date & Time</span><span class="sval">${D.datetime_final||dt}</span></div>
    </div>
  </div>`;
}

function showAlts(alts) {
  const cb=document.getElementById('chatbox');
  const wrap=document.createElement('div'); wrap.className='dtopts';
  alts.forEach(a=>{
    const c=document.createElement('div'); c.className='dtcard';
    c.innerHTML=`<span style="font-size:18px">📅</span>
      <div><div style="font-size:13.5px;color:var(--text)">${a.label}</div>
      <div style="font-size:12px;color:var(--muted)">${a.sub||'Available'}</div></div>`;
    c.onclick=async()=>{
      wrap.remove(); userMsg(a.label);
      D.datetime_final=a.label; showT();
      try {
        const r=await fetch(WH,{method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({sessionId:sid,action:'rebook_interview',
            name:D.name,email:D.email,role:D.role,datetime:a.label,
            message:`Rebook to: ${a.label}`})});
        hideT();
        const txt=await r.text(); let j={}; try{j=JSON.parse(txt);}catch(e){}
        showSuccess(j.reply||j.output||`Interview rescheduled to <strong>${a.label}</strong>. Confirmation sent to ${D.email}. 🎉`);
      } catch(e){ hideT(); botMsg('⚠️ Rebook failed. Please try again.'); }
    };
    wrap.appendChild(c);
  });
  cb.appendChild(wrap); cb.scrollTop=9999;
}

function genAlts() {
  const slots=[]; const tms=[['10:00','10:00 AM'],['14:00','2:00 PM'],['16:00','4:00 PM']];
  let base=new Date(D.date+'T12:00:00'), off=1, cnt=0;
  while(cnt<3){ const d=new Date(base); d.setDate(base.getDate()+off); const day=d.getDay();
    if(day!==0&&day!==6){ slots.push({label:fmtDT(d.toISOString().split('T')[0],tms[cnt][0]),sub:'Available slot'}); cnt++; } off++; }
  return slots;
}

function botMsg(html) {
  const row=document.createElement('div'); row.className='mrow bot';
  row.innerHTML=`<div class="av">🤖</div><div class="bub">${html}</div>`;
  document.getElementById('chatbox').appendChild(row);
  document.getElementById('chatbox').scrollTop=9999;
}
function userMsg(t) {
  const row=document.createElement('div'); row.className='mrow u';
  row.innerHTML=`<div class="av">🧑</div><div class="bub">${t}</div>`;
  document.getElementById('chatbox').appendChild(row);
  document.getElementById('chatbox').scrollTop=9999;
}
function showT() {
  const row=document.createElement('div'); row.className='mrow bot'; row.id='typ';
  row.innerHTML=`<div class="av">🤖</div><div class="bub tdots"><div class="td"></div><div class="td"></div><div class="td"></div></div>`;
  document.getElementById('chatbox').appendChild(row); document.getElementById('chatbox').scrollTop=9999;
}
function hideT(){ const t=document.getElementById('typ'); if(t)t.remove(); }

render(0);
</script>
</body>
</html>
